<title>YGARMEX — Sistema Completo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F0F2F7;color:#1A2744;font-size:14px;padding-bottom:80px;}
:root{--navy:#1B2A4A;--orange:#F5820D;--green:#2ECC8F;--red:#C1442D;--yellow:#D98E2B;--bg:#F0F2F7;--card:#fff;--muted:#6B7A99;--border:#DDE3F0;}

/* ── HEADER ── */
#header{background:var(--navy);position:sticky;top:0;z-index:100;padding:0 14px;}
#header-top{display:flex;align-items:center;justify-content:space-between;padding:10px 0 6px;}
#logo{display:flex;align-items:center;gap:10px;}
#logo-icon{background:var(--orange);border-radius:9px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;}
#logo-text{color:#fff;font-weight:800;font-size:14px;}
#logo-sub{color:#8899BB;font-size:9px;}
#nav-icons{display:flex;gap:2px;}
.nav-btn{background:none;border:none;cursor:pointer;padding:6px 8px;border-radius:8px;font-size:16px;position:relative;color:#8899BB;}
.nav-btn.active{background:rgba(245,130,13,.2);color:var(--orange);}
#alert-badge{position:absolute;top:4px;right:4px;background:var(--red);color:#fff;border-radius:99px;width:13px;height:13px;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;}
#nav-labels{display:flex;}
.nav-label{flex:1;text-align:center;font-size:9px;font-weight:700;color:#8899BB;padding:4px 0 8px;cursor:pointer;border-bottom:2px solid transparent;}
.nav-label.active{color:var(--orange);border-bottom-color:var(--orange);}

/* ── CONTENT ── */
#content{padding:14px 12px;max-width:960px;margin:0 auto;}

/* ── CARDS ── */
.card{background:var(--card);border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(26,39,68,.08);margin-bottom:12px;}
.card h4{font-size:13px;color:var(--navy);margin-bottom:10px;}

/* ── KPI ── */
.kpi-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.kpi{background:var(--card);border-radius:12px;padding:13px;flex:1;min-width:110px;box-shadow:0 1px 4px rgba(26,39,68,.08);}
.kpi-icon{font-size:18px;margin-bottom:2px;}
.kpi-val{font-size:20px;font-weight:800;line-height:1.1;}
.kpi-label{font-size:10px;color:var(--muted);margin-top:3px;}

/* ── HISTORIAL MP ── */
.hist-row{border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;background:#fff;}
.hist-row-dim{background:#F7F5F0;opacity:0.85;}
.hist-row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.hist-qty{font-weight:800;font-size:15px;color:#4F7858;}
.hist-fecha{font-size:12px;color:#6B7A99;}
.hist-prov{font-size:13px;font-weight:600;margin-bottom:2px;}
.hist-notas{font-size:12px;color:#6B7A99;line-height:1.4;}
.hist-tag{display:flex;align-items:center;gap:4px;font-size:11px;color:#D98E2B;margin-top:4px;font-weight:600;}

/* ── BADGE ── */
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700;}

/* ── BUTTONS ── */
.btn{border:none;border-radius:8px;cursor:pointer;font-weight:700;font-family:inherit;font-size:13px;padding:8px 16px;}
.btn-primary{background:var(--orange);color:#fff;}
.btn-ghost{background:transparent;color:var(--navy);border:1.5px solid var(--border);}
.btn-success{background:#E8FAF3;color:#1a7a56;border:1.5px solid rgba(46,204,143,.4);}
.btn-danger{background:#FFF5F5;color:var(--red);border:1.5px solid rgba(193,68,45,.25);}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-full{width:100%;margin-top:6px;}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{padding:7px 10px;text-align:left;color:var(--muted);font-size:11px;font-weight:700;border-bottom:2px solid var(--border);white-space:nowrap;}
td{padding:8px 10px;color:var(--navy);border-bottom:1px solid var(--border);}
tr:nth-child(even) td{background:#FAFBFD;}

/* ── TAB BAR ── */
.tab-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.tab-btn{padding:6px 13px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:12px;background:var(--border);color:var(--muted);}
.tab-btn.active{background:var(--navy);color:#fff;}

/* ── SILO ── */
.silo-wrap{width:32px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;}
.silo-cap{width:36px;height:6px;background:#D8D2C2;border-radius:4px 4px 0 0;margin-bottom:-1px;}
.silo-body{width:32px;height:60px;background:#EFEAE0;border-radius:0 0 8px 8px;overflow:hidden;display:flex;align-items:flex-end;border:1px solid #DDD6C7;}
.silo-fill{width:100%;transition:height .3s ease;}

/* ── ALERT STRIP ── */
.alert-strip{background:#2A1B05;color:#FCE8C8;margin-bottom:12px;border-radius:12px;padding:10px 14px;border:1px solid #D98E2B55;}
.alert-strip-head{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;margin-bottom:8px;}
.alert-item-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid #D98E2B33;}

/* ── MODAL ── */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:flex-end;justify-content:center;}
#modal-overlay.open{display:flex;}
#modal-box{background:#fff;width:100%;max-width:560px;border-radius:18px 18px 0 0;padding:20px 16px 30px;max-height:88vh;overflow-y:auto;}
#modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
#modal-title{font-size:15px;font-weight:700;color:var(--navy);}
#modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.form-label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
.form-input,.form-select{border:1.5px solid var(--border);border-radius:8px;padding:9px 10px;font-size:14px;color:var(--navy);outline:none;font-family:inherit;background:#fff;width:100%;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* ── PRODUCCION FORM ── */
.prod-linea{background:#F7F5F0;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--border);}
.prod-linea-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.prod-linea-num{font-size:11px;font-weight:700;color:var(--orange);background:#FFF3E0;padding:2px 8px;border-radius:99px;}
.consumo-preview{background:#E8FAF3;border-radius:8px;padding:10px;margin-top:10px;font-size:12px;}
.consumo-row{display:flex;justify-content:space-between;padding:2px 0;color:#1a7a56;}

/* ── BAR ── */
.bar-wrap{background:var(--border);border-radius:99px;height:5px;margin-top:3px;}
.bar-fill{height:5px;background:var(--orange);border-radius:99px;}

/* ── FOOTER ── */
#footer{text-align:center;padding:10px 0 16px;color:var(--muted);font-size:10px;}
</style>

const kpi=(icon,val,label,color='#1A2744',sub='')=>`<div class="kpi"><div class="kpi-icon">${icon}</div><div class="kpi-val" style="color:${color}">${val}</div><div class="kpi-label">${label}</div>${sub?`<div style="font-size:9px;color:#6B7A99;margin-top:1px">${sub}</div>`:''}</div>`;

function calcularConsumo(lineas) {
  const consumo = {};
  for (const l of lineas) {
    const f = FORMULAS[l.productoId];
    if (!f) continue;
    const factor = f.tipo === 'consome' ? l.cantidad / 100 : l.cantidad;
    for (const [matId, kg] of Object.entries(f.formula)) {
      consumo[matId] = (consumo[matId] || 0) + kg * factor;
    }
  }
  return consumo;
}

function exportJSON(d,n){const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=n+'.json';a.click();}
function exportCSV(rows,cols,n){const h=cols.map(c=>c.l).join(',');const b=rows.map(r=>cols.map(c=>`"${r[c.k]??''}`).join(',')).join('\n');const bl=new Blob([h+'\n'+b],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(bl);a.download=n+'.csv';a.click();}

function openModal(title, body) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if(e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

function confirmarEntradaMP() {
  const matId = document.getElementById('emp-mat').value;
  const cant = parseFloat(document.getElementById('emp-cant').value)||0;
  const nota = document.getElementById('emp-nota').value;
  const prov = document.getElementById('emp-prov').value;
  const fecha = document.getElementById('emp-fecha').value;
  if(!matId||cant<=0){alert('Completa material y cantidad');return;}
  const item = mp.find(i=>i.id===matId);
  mp = mp.map(i=>i.id===matId?{...i,stock:i.stock+cant}:i);
  movMP.push({id:nextId++,fecha,matId,nombre:item.nombre,tipo:'entrada',cantidad:cant,nota:prov+(nota?' · '+nota:'')});
  closeModal();render();
}

function confirmarMovMP(id, tipo) {
  const item = mp.find(i=>i.id===id);

let prodLineas = [{productoId:'', cantidad:''}];

function tabProduccion() {
  const consumoPreview = calcularConsumo(
    prodLineas.filter(l=>l.productoId&&parseFloat(l.cantidad)>0)
      .map(l=>({productoId:l.productoId,cantidad:parseFloat(l.cantidad)}))
  );

  let html = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-weight:700;font-size:13px;color:#1A2744">🏭 Registrar Producción</div>
      <div style="font-size:10px;color:#6B7A99">Base: conteo Omar 03-jul</div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <h4 style="margin:0">Productos producidos hoy</h4>
        <button class="btn btn-sm btn-primary" onclick="agregarLineaProd()">+ Agregar</button>

        ${prodLineas.map((l,i)=>`
          <div class="prod-linea">

              <span class="prod-linea-num">Producto ${i+1}</span>
              ${prodLineas.length>1?`<button class="btn btn-sm btn-danger" onclick="quitarLineaProd(${i})">Quitar</button>`:''}
            </div>
            <div class="form-group"><label class="form-label">Producto</label>
              <select class="form-select" onchange="actualizarLineaProd(${i},'productoId',this.value)">
                <option value="">Selecciona…</option>
                <optgroup label="Consomé">
                  ${Object.entries(FORMULAS).filter(([k,v])=>v.tipo==='consome').map(([k,v])=>`<option value="${k}" ${l.productoId===k?'selected':''}>${v.label}</option>`).join('')}
                </optgroup>
                <optgroup label="Gelatina">
                  ${Object.entries(FORMULAS).filter(([k,v])=>v.tipo==='gelatina').map(([k,v])=>`<option value="${k}" ${l.productoId===k?'selected':''}>${v.label}</option>`).join('')}
                </optgroup>
              </select>
            </div>
            <div class="form-group"><label class="form-label">${l.productoId&&FORMULAS[l.productoId]?.tipo==='gelatina'?'Revolturas':'Kg producidos'}</label>
              <input class="form-input" type="number" step="0.5" value="${l.cantidad}" oninput="actualizarLineaProd(${i},'cantidad',this.value)" placeholder="${l.productoId&&FORMULAS[l.productoId]?.tipo==='gelatina'?'ej. 3 revolturas':'ej. 500 kg'}">
            </div>
          </div>`).join('')}
      </div>
      ${tieneConsumo?`
        <div class="consumo-preview">
          <div style="font-weight:700;font-size:12px;color:#065f46;margin-bottom:6px">📉 MP que se va a descontar:</div>
          ${Object.entries(consumoPreview).map(([matId,kg])=>{
            const mat = mp.find(m=>m.id===matId);
            const insuf = mat && kg > mat.stock;
            return `<div class="consumo-row" style="color:${insuf?'#C1442D':'#1a7a56'}">
              <span>${mat?.nombre||matId}</span>
              <span>${insuf?'⚠️ ':''}<b>−${fmtN(Math.round(kg*100)/100)}</b> ${mat?.unidad||'kg'}${insuf?` (solo hay ${fmtN(mat.stock)})`:''}
              </span>
            </div>`;
          }).join('')}
        </div>`:''}
      <div style="display:flex;gap:8px;margin-top:12px">
        <input class="form-input" id="prod-fecha" type="date" value="${today()}" style="flex:1">
        <button class="btn btn-primary" onclick="registrarProduccion()" style="flex:2">✅ Registrar Producción</button>

          <td>${r.fecha}</td>
          <td style="font-size:11px">${r.lineas.map(l=>FORMULAS[l.productoId]?.label+' '+fmtN(l.cantidad)+(FORMULAS[l.productoId]?.tipo==='gelatina'?' rev':' kg')).join('<br>')}</td>

  }
  return html;
}

function agregarLineaProd() {
  prodLineas = [...prodLineas, {productoId:'',cantidad:''}];
  render();
}

function quitarLineaProd(i) {
  prodLineas = prodLineas.filter((_,j)=>j!==i);
  render();
}

function actualizarLineaProd(i, campo, valor) {
  prodLineas = prodLineas.map((l,j)=>j===i?{...l,[campo]:valor}:l);
  render();
}

function registrarProduccion() {
  const lineasValidas = prodLineas
    .filter(l=>l.productoId&&parseFloat(l.cantidad)>0)
    .map(l=>({productoId:l.productoId,cantidad:parseFloat(l.cantidad)}));
  if(lineasValidas.length===0){alert('Agrega al menos un producto con cantidad');return;}
  const fecha = document.getElementById('prod-fecha').value;
  const consumo = calcularConsumo(lineasValidas);

  // Verificar si hay suficiente MP
  const insuficientes = Object.entries(consumo).filter(([matId,kg])=>{
    const mat = mp.find(m=>m.id===matId);
    return mat && kg > mat.stock;
  });
  if(insuficientes.length>0) {
    const msgs = insuficientes.map(([matId,kg])=>{
      const mat = mp.find(m=>m.id===matId);
      return `${mat.nombre}: necesitas ${fmtN(Math.round(kg*10)/10)}, hay ${fmtN(mat.stock)}`;
    });
    if(!confirm(`⚠️ MP insuficiente:\n${msgs.join('\n')}\n\n¿Registrar de todas formas?`)) return;
  }

  // Descontar MP
  for(const [matId,kg] of Object.entries(consumo)) {
    const mat = mp.find(m=>m.id===matId);
    if(!mat) continue;
    mp = mp.map(m=>m.id===matId?{...m,stock:Math.max(0,m.stock-kg)}:m);
    movMP.push({id:nextId++,fecha,matId,nombre:mat.nombre,tipo:'salida',cantidad:Math.round(kg*100)/100,nota:'Producción: '+lineasValidas.map(l=>FORMULAS[l.productoId]?.label).join(', ')});
  }

  registrosProd.push({id:nextId++,fecha,lineas:lineasValidas,consumo});
  prodLineas = [{productoId:'',cantidad:''}];
  alert('✅ Producción registrada. MP descontada automáticamente.');
  render();
}

let ventaBusca = '';
let ventaFiltro = 'todos';

function tabVentas() {

    const cl = clientes.find(c=>c.id===p.clienteId);
    return(!ventaBusca||(cl&&cl.nombre.toLowerCase().includes(ventaBusca.toLowerCase())))

      <select style="border:1.5px solid #DDE3F0;border-radius:8px;padding:7px 11px;font-size:13px;font-family:inherit;outline:none;background:#fff" onchange="ventaFiltro=this.value;render()">

function cobrarPedido(id){pedidos=pedidos.map(p=>p.id===id?{...p,pagado:true}:p);render();}

function openModalDetCli(id) {
  const c=clientes.find(x=>x.id===id); if(!c)return;
  const pc=pedidos.filter(p=>p.clienteId===id).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const tot=pc.reduce((s,p)=>s+p.cantidad*p.precio,0);
  const pend=pc.filter(p=>!p.pagado).reduce((s,p)=>s+p.cantidad*p.precio,0);
  openModal(`👤 ${c.nombre}`,`
    <div style="background:#F0F2F7;border-radius:8px;padding:12px;font-size:13px;margin-bottom:12px">

      ${c.nota?`<div style="margin-top:6px;color:${c.nota.includes('⚠')?'#F5820D':'#6B7A99'};font-weight:600">${esc(c.nota)}</div>`:''}
    </div>
    <div class="tbl-wrap"><table><thead><tr><th>Fecha</th><th>Producto</th><th>Importe</th><th>Estado</th></tr></thead>
    <tbody>${pc.map(p=>`<tr><td>${p.fecha}</td><td>${esc(p.producto)}</td><td>${fmt(p.cantidad*p.precio)}</td><td>${badge(p.pagado?'✓':'⏳',p.pagado?'#2ECC8F':'#F5820D')}</td></tr>`).join('')||'<tr><td colspan="4" style="text-align:center;color:#6B7A99">Sin pedidos</td></tr>'}</tbody></table></div>
    <div style="font-weight:700;font-size:13px;margin-top:10px">Total: ${fmt(tot)} · Pendiente: ${fmt(pend)}</div>`);
}

function openModalPedido() {

    <div class="form-group"><label class="form-label">Cliente</label>

function agregarPedido() {
  const cid=parseInt(document.getElementById('np-cli').value);
  const prod=document.getElementById('np-prod').value;
  const cant=parseFloat(document.getElementById('np-cant').value);
  const precio=parseFloat(document.getElementById('np-precio').value);
  if(!cid||!prod||!cant||!precio){alert('Completa todos los campos');return;}
  pedidos.unshift({id:nextId++,clienteId:cid,fecha:document.getElementById('np-fecha').value,
    producto:prod,cantidad:cant,precio,pagado:document.getElementById('np-pag').value==='true',
    formaPago:document.getElementById('np-fp').value,nota:document.getElementById('np-nota').value});
  closeModal();render();
}

function openModalCliente() {
  openModal('👤 Nuevo Cliente',`
    <div class="form-group"><label class="form-label">Nombre</label><input class="form-input" id="nc-nombre"></div>
    <div class="form-group"><label class="form-label">Zona</label><input class="form-input" id="nc-zona"></div>
    <div class="form-group"><label class="form-label">Días crédito (0=contado)</label><input class="form-input" id="nc-cred" type="number" value="0"></div>

    <button class="btn btn-primary btn-full" onclick="agregarCliente()">✅ Agregar</button>`);
}

function agregarCliente() {
  const nombre=document.getElementById('nc-nombre').value;
  if(!nombre)return;
  clientes.push({id:nextId++,nombre,zona:document.getElementById('nc-zona').value,
    credito:parseInt(document.getElementById('nc-cred').value)||0,nota:document.getElementById('nc-nota').value});
  closeModal();render();
}

let cobrosVista = 'pendiente';

function tabCobros() {
  const pend=pedidos.filter(p=>!p.pagado);

  const xCob=pend.reduce((s,p)=>s+p.cantidad*p.precio,0);

      ${porCli.map(c=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#FFF3E0;border-radius:9px;margin-bottom:7px;flex-wrap:wrap;gap:8px">
        <div>

          <button class="btn btn-ghost btn-sm" onclick="exportJSON({pendientes:pedidos.filter(p=>!p.pagado),pagados:pedidos.filter(p=>p.pagado)},'cobros_ygarmex')">⬇ JSON</button>
        </div>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Fecha</th><th>Cliente</th><th>Producto</th><th>Importe</th><th>F.Pago</th><th>Nota</th><th></th></tr></thead>
        <tbody>
          ${filas.map(p=>{const cl=clientes.find(c=>c.id===p.clienteId);return`<tr>
            <td>${p.fecha}</td>
            <td>${esc(getNombreCliente(p))}</td>
            <td>${esc(p.producto)}</td>
            <td>${fmt(p.cantidad*p.precio)}</td>
            <td style="font-size:11px">${esc(p.formaPago)}</td>
            <td style="font-size:11px;color:#6B7A99">${esc(p.nota)}</td>
            <td>${!p.pagado?`<button class="btn btn-success btn-sm" onclick="cobrarPedido(${p.id})">✓</button>`:''}</td>
          </tr>`;}).join('')||`<tr><td colspan="7" style="padding:20px;text-align:center;color:#6B7A99">${cobrosVista==='pendiente'?'🎉 Sin cuentas pendientes':'Sin cobros'}</td></tr>`}

    </div>`;
}

function saldarCliente(cid){pedidos=pedidos.map(p=>p.clienteId===cid&&!p.pagado?{...p,pagado:true}:p);render();}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();

<!-- ── FIREBASE — leer pedidos en tiempo real ── -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
// Mismo proyecto Firebase que la app de pedidos de tu mamá
firebase.initializeApp({
  apiKey: "AIzaSyAXso4z0NLz9v7yWPevvb9z0GcdJ1prOiI",
  authDomain: "app-pedidos-28256.firebaseapp.com",
  projectId: "app-pedidos-28256",
  storageBucket: "app-pedidos-28256.firebasestorage.app",
  messagingSenderId: "137002791713",
  appId: "1:137002791713:web:16c20a6ffc2c23f06cc460"
});
const db = firebase.firestore();

// Indicador de conexión
let fbConectado = false;

// ── HELPER: obtener nombre de cliente para mostrar ────────────────────────────
function getNombreCliente(p) {
  // Si tiene clienteId válido, usar el directorio
  if (p.clienteId) {
    const cl = clientes.find(c => c.id === p.clienteId);
    if (cl) return cl.nombre.split('–')[0].split('(')[0].trim();
  }
  // Si viene de Firebase, usar el nombre original
  if (p.clienteNombre) return p.clienteNombre;
  return '—';
}
function fbPedidoToLocal(doc) {
  const d = doc.data();
  // El campo en Firebase se llama clienteNombre
  const nombre = d.clienteNombre || d.cliente || '';
  let clienteId = 0;
  const cli = clientes.find(c =>
    c.nombre.toLowerCase().includes(nombre.toLowerCase().split(' ')[0]) ||
    nombre.toLowerCase().includes(c.nombre.toLowerCase().split(' ')[0])
  );
  if (cli) clienteId = cli.id;

  // Calcular importe — usar monto directo si existe
  const lineas = d.lineas || [];
  const importe = d.monto || lineas.reduce((s, l) => {
    const cant = parseFloat(l.cantidad) || 0;
    const precio = parseFloat(l.precioUnit) || 0;
    return s + cant * precio;
  }, 0);

  // Producto: concatenar líneas
  const producto = lineas.map(l => `${l.producto} (${l.cantidad} ${l.unidad||''})`).join(' + ') || d.producto || '—';
  const nota = (d.remision && d.remision !== '—' ? 'Rem: ' + d.remision + ' · ' : '') + (d.zona || '') + (d.vehiculo ? ' · ' + d.vehiculo : '');

  return {
    id: 'fb_' + doc.id,
    clienteId,
    clienteNombre: nombre,
    fecha: d.fechaEntrega || d.fecha || '',
    producto,
    cantidad: 1,
    precio: importe,
    pagado: d.status === 'entregado',
    formaPago: d.condiciones || 'Contado',
    nota: nota.trim(),
    fbStatus: d.status || 'pendiente',
    fbId: doc.id,
  };
}

// ── ESCUCHAR PEDIDOS EN TIEMPO REAL ──────────────────────────────────────────
let fbPedidos = []; // pedidos que vienen de Firebase
let fbEscuchando = false;

function escucharPedidosFB() {
  if (fbEscuchando) return;
  fbEscuchando = true;

  db.collection('pedidos').onSnapshot(snapshot => {
    fbPedidos = snapshot.docs
      .map(doc => fbPedidoToLocal(doc))
      .filter(p => p.fecha) // solo los que tienen fecha
      .sort((a, b) => (b.fecha || '').localeCompare(a.fecha || ''));

    fbConectado = true;

    // Combinar: pedidos locales + Firebase (evitar duplicados por fecha+cliente+producto)
    const fbIds = new Set(fbPedidos.map(p => p.id));
    const locales = pedidos.filter(p => !p.id.toString().startsWith('fb_'));
    pedidos = [...locales, ...fbPedidos];

    // Actualizar badge
    const pend = pedidos.filter(p => !p.pagado).length;

    if (currentTab === 'ventas' || currentTab === 'cobros' || currentTab === 'dashboard') {
      render();
    }
    console.log(`✅ Firebase: ${fbPedidos.length} pedidos cargados`);
  }, err => {
    console.warn('Firebase pedidos no disponible:', err.message);
    fbConectado = false;
  });
}

// ── MARCAR COMO PAGADO EN FIREBASE ───────────────────────────────────────────
async function cobrarPedidoFB(fbId) {
  try {
    await db.collection('pedidos').doc(fbId).update({ status: 'entregado' });
  } catch(e) {
    console.error('Error actualizando Firebase:', e);
  }
}

// Sobreescribir cobrarPedido para sincronizar con Firebase
const _cobrarPedidoOriginal = cobrarPedido;
window.cobrarPedido = function(id) {
  const p = pedidos.find(x => x.id == id || x.id === id);
  if (p && p.fbId) {
    cobrarPedidoFB(p.fbId);
  }
  pedidos = pedidos.map(x => (x.id == id || x.id === id) ? {...x, pagado: true} : x);
  render();
};

// ── INDICADOR EN EL HEADER ───────────────────────────────────────────────────
function actualizarIndicadorFB() {
  const sub = document.getElementById('logo-sub');
  if (sub) {
    sub.textContent = fbConectado
      ? '🟢 En vivo · Firebase conectado'
      : 'Los Reyes La Paz · base: Omar 03-jul-2026';
  }
}

// ── INICIAR CONEXIÓN ─────────────────────────────────────────────────────────
escucharPedidosFB();
setInterval(actualizarIndicadorFB, 2000);
</script>
